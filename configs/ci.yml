# meradOS Standard CI Template
# Adjust triggers, Node/Python versions, and test commands per project

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Node.js projects ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

      # --- Python projects (uncomment) ---
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.13"
      # - run: pip install ruff pytest pytest-cov
      # - run: ruff check .
      # - run: ruff format --check .

  test:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

      # Python (uncomment)
      # - run: pytest --cov --cov-fail-under=40

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
